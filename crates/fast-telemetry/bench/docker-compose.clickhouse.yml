services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: fast-telemetry-clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP interface (smoke tests, ad-hoc queries)
      - "9000:9000"   # Native TCP (used by fast-telemetry-export clickhouse exporter)
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
